<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#07071a">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>Vực Sâu Vô Tận</title>
<link rel="manifest" href="manifest.json">
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;user-select:none;-webkit-user-select:none;}
html,body{width:100%;height:100%;overflow:hidden;background:#07071a;touch-action:none;}
#gameCanvas{display:block;position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);image-rendering:pixelated;image-rendering:crisp-edges;touch-action:none;}
#ad-placeholder{display:none;position:fixed;bottom:0;width:100%;height:60px;background:rgba(0,0,0,0.8);color:#666;text-align:center;line-height:60px;font-size:12px;z-index:999;}
</style>
</head>
<body>
<canvas id="gameCanvas"></canvas>
<div id="ad-placeholder">[ Quảng cáo - Placeholder ]</div>
<script src="script.js"></script>
</body>
</html>
